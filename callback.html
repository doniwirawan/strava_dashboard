<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting… — Strava Dashboard</title>
  <style>
    :root { --orange: #FC4C02; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0c0c; color: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 20px;
    }
    .logo { font-size: 22px; font-weight: 800; color: var(--orange); }
    .msg { font-size: 15px; color: #888; }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid #2a2a2a; border-top-color: var(--orange);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; font-size: 14px; text-align: center; max-width: 400px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="logo">Strava Dashboard</div>
  <div class="spin" id="spinner"></div>
  <div class="msg" id="msg">Exchanging authorization code…</div>

  <script>
    const CLIENT_ID     = '__STRAVA_CLIENT_ID__';
    const CLIENT_SECRET = '__STRAVA_CLIENT_SECRET__';

    async function exchange() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const error  = params.get('error');

      if (error || !code) {
        showError(error === 'access_denied'
          ? 'You denied access. Close this tab and try again.'
          : 'No authorization code received. Please try again.');
        return;
      }

      try {
        const r = await fetch('https://www.strava.com/oauth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            client_id:     CLIENT_ID,
            client_secret: CLIENT_SECRET,
            code,
            grant_type: 'authorization_code'
          })
        });

        if (!r.ok) throw new Error('Token exchange failed (' + r.status + ')');
        const data = await r.json();

        // Save tokens to localStorage
        localStorage.setItem('strava_access_token',  data.access_token);
        localStorage.setItem('strava_refresh_token', data.refresh_token);
        localStorage.setItem('strava_expires_at',    data.expires_at);

        document.getElementById('msg').textContent = 'Connected! Redirecting…';
        setTimeout(() => { window.location.href = '/'; }, 800);

      } catch (e) {
        showError('Error: ' + e.message);
      }
    }

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').className = 'error';
      document.getElementById('msg').textContent = msg;
    }

    exchange();
  </script>
</body>
</html>
